<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Mastery Tasks</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Task 1: DOM Structure Analysis -->
    <section id="task1">
      <h2>Task 1 — DOM Structure Analysis</h2>
      <div id="container">
        <p id="first-child">First Paragraph</p>
        <p id="middle-child">Middle Paragraph</p>
        <p id="last-child">Last Paragraph</p>
      </div>
    </section>

    <!-- Task 2: Dynamic Card (created fully by JS) -->
    <section id="task2">
      <h2>Task 2 — Dynamic Content Builder</h2>
      <!-- Card injected by JS -->
    </section>

    <!-- Task 3: DOM Traversing -->
    <section id="task3">
      <h2>Task 3 — DOM Traversing Challenge</h2>
      <div id="wrapper">
        <ul id="myList">
          <li>Item 1</li>
          <li>Item 2</li>
          <li id="target-item">Item 3 (target)</li>
          <li>Item 4</li>
          <li>Item 5</li>
        </ul>
      </div>
    </section>

    <!-- Task 4: Replace & Update -->
    <section id="task4">
      <h2>Task 4 — Replace & Update</h2>
      <div id="replace-container">
        <p id="old-element" class="old">This is the OLD element</p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
